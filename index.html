<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #152618;
      --olive: #798C4F;
      --gold: #D9B504;
      --sand: #D9CA9C;
      --bone: #D9D0C7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'Archivo Black', sans-serif;
      background: var(--dark);
      color: var(--bone);
      overflow-y: auto;
    }

    .cover {
      height: 100dvh;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 3vh, 2.5rem) 2rem;
      background: var(--dark);
      color: var(--sand);
      gap: clamp(1rem, 3vh, 2.5rem);
    }

    .cover-header {
      width: 100%;
      text-align: center;
    }

    .cover h1 {
      font-size: clamp(2.5rem, 14vh, 22rem);
      line-height: 0.85;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      word-break: break-word;
    }

    .cover .tagline {
      font-size: clamp(0.65rem, 1.8vh, 1.6rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-wrap: "pretty";
      color: var(--olive);
      margin-top: clamp(0.5rem, 1.5vh, 1.5rem);
    }

    .link-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(0.4rem, 1.5vh, 1.25rem);
      width: 100%;
      max-width: 600px;
    }

    .icon-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: clamp(0.5rem, 1.5vh, 1rem) clamp(0.75rem, 2vw, 1.5rem);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      text-decoration: none;
      color: var(--sand);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .icon-link:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.1);
    }

    .icon-link svg {
      width: clamp(18px, 2.5vh, 28px);
      height: clamp(18px, 2.5vh, 28px);
      flex-shrink: 0;
    }

    .link-label {
      font-size: clamp(0.7rem, 1.6vh, 1.1rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .link-grid .icon-link:last-child:nth-child(odd) {
      grid-column: 1 / -1;
      width: calc(50% - clamp(0.2rem, 0.75vh, 0.625rem));
      margin: 0 auto;
    }


    @media (max-width: 480px) {
      .icon-link {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 0.4rem;
      }
    }
  </style>
</head>
